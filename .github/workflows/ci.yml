name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5.26.0-community
        env:
          NEO4J_AUTH: neo4j/change_me_locally
          NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
          NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
          NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: change_me_locally
      NEO4J_DATABASE: neo4j

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: ruff format --check .

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:7474 > /dev/null && exit 0
            sleep 5
          done
          echo "Neo4j did not become healthy in time" && exit 1

      - name: Apply schema (constraints/indexes)
        working-directory: backend
        run: python scripts/reset_database.py

      - name: Run unit + integration tests
        working-directory: backend
        run: pytest -v

      - name: Build backend Docker image
        run: docker build -t fraud-backend:ci ./backend

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (oxlint)
        working-directory: frontend
        run: npm run lint

      - name: Type check + build
        working-directory: frontend
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t fraud-frontend:ci ./frontend
